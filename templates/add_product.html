{% extends 'base.html' %}
{% load static %}

{% block title %}Add Product - Ocean Market{% endblock %}

{% block extra_css %}
<style>
    .add-product-section {
        padding: 3rem 5%;
        background: linear-gradient(180deg, #f0f9ff 0%, #fff 100%);
        min-height: 70vh;
    }
    
    .form-container {
        max-width: 700px;
        margin: 0 auto;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 100, 150, 0.1);
        overflow: hidden;
    }
    
    .form-header {
        background: linear-gradient(135deg, #0077b6, #00b4d8);
        padding: 2rem;
        color: #fff;
        text-align: center;
    }
    
    .form-header h1 {
        font-family: 'Playfair Display', serif;
    }
    
    .form-body {
        padding: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        color: #333;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #0077b6;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    
    .btn-submit {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #0077b6, #00b4d8);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 180, 216, 0.4);
    }
</style>
{% endblock %}

{% block content %}
<section class="add-product-section">
    <div class="form-container">
        <div class="form-header">
            <h1><i class="fas fa-plus-circle"></i> Add New Product</h1>
        </div>
        
        <div class="form-body">
            <form method="POST" action="{% url 'add_product' %}" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" required>
                        <option value="">Select Category</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" name="name" id="name" required placeholder="Enter product name">
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" rows="4" required placeholder="Enter product description"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="image">Product Image</label>
                    <input type="file" name="image" id="image" accept="image/*" placeholder="Choose product image">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (₹)</label>
                        <input type="number" name="price" id="price" step="0.01" required placeholder="0.00">
                    </div>
                    
                    <div class="form-group">
                        <label for="weight">Weight</label>
                        <input type="text" name="weight" id="weight" required placeholder="e.g., 1kg">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="stock_status">Stock Status</label>
                        <select name="stock_status" id="stock_status" required>
                            <option value="in_stock">In Stock</option>
                            <option value="low_stock">Low Stock</option>
                            <option value="out_of_stock">Out of Stock</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="stock_quantity">Stock Quantity</label>
                        <input type="number" name="stock_quantity" id="stock_quantity" value="0" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
